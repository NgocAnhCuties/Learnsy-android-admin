name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      # Gradle CLI dùng để sinh gradlew (project chưa có sẵn wrapper)
      - name: Install Gradle CLI
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "SUPA_URL=${{ secrets.SUPA_URL }}" >> local.properties
          echo "SUPA_KEY=${{ secrets.SUPA_KEY }}" >> local.properties
          echo "UPSTASH_URL=${{ secrets.UPSTASH_URL }}" >> local.properties
          echo "UPSTASH_TOKEN=${{ secrets.UPSTASH_TOKEN }}" >> local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── Release APK ──
      # Chưa có keystore riêng nên ký tạm bằng debug keystore mặc định của
      # Android SDK để cài thử ngay được trên máy — vẫn có đầy đủ R8/minify/
      # shrink resources như build release thật, chỉ khác chữ ký. Khi có
      # keystore chính thức thì thay signingConfig trong build.gradle.kts.
      - name: Sign release with debug keystore (tạm, để test)
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Learnsy Debug,O=Learnsy,C=VN" || true

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: learnsy-release-apk
          path: app/build/outputs/apk/release/app-release*.apk
